repos:	 
  # C++ 代码格式化检查 
  - repo: https://github.com/pre-commit/mirrors-clang-format	 
    rev: v16.0.0	 
    hooks:	 
      - id: clang-format	 
        types_or: [c++, c]	 

  # Python 代码检查 
  - repo: https://gitcode.com/gh_mirrors/ru/ruff-pre-commit 
    rev: v0.14.14 
    hooks: 
      - id: ruff-check 
        args: ["--output-format", "github", "--fix"] 
        types: [python] 
      - id: ruff-format 
        types: [python] 
