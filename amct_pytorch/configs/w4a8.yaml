# Uniform W4A8 across all linears.
w_bits: 4
a_bits: 8

moe:
  routed:
    w_bits: 4                              # group-level: bump all shared-expert
    a_bits: 8
  shared:
    w_bits: 8                              # group-level: bump all shared-expert
    a_bits: 8