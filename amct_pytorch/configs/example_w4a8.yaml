# Example: global W4A8 with per-layer overrides, grouped by --quant_target.
#
# Schema:
#   - Top-level ``w_bits`` / ``a_bits`` set the global default. Must be paired
#     (set both or neither — bf16.yaml is "neither", everything stays at 16).
#   - Inside a group (``attn-linear`` / ``mlp`` / ``moe``), an entry may set
#     ``w_bits`` / ``a_bits`` to override for that subtree, BUT it must set
#     both keys — partial entries (only w or only a) are rejected at load.
#   - Leaf keys inside a group match the ``name=`` passed to QuantLinear (the
#     real layer name: q_proj / wq_a / comp_wkv / ...).
#   - ``moe`` has two sub-blocks ``routed`` / ``shared`` (routed-expert and
#     shared-expert MLPs).
#   - Resolution: walks from most-specific (leaf) to least-specific; returns
#     the first complete entry. If none, falls back to top-level.
#
# This file demonstrates W4A8 globally with a few high-precision overrides.

w_bits: 4
a_bits: 8

attn-linear:
  # Bump attention output projection (sees concatenated heads).
  o_proj: { w_bits: 8, a_bits: 16 }

  # MLA layers (deepseek_v4 / longcat / glm5). Listed only as examples — any
  # not present in the actual model are silently ignored.
  comp_wgate:       { w_bits: 8,  a_bits: 8 }    # compressor scoring head
  idx_weights_proj: { w_bits: 16, a_bits: 16 }   # indexer scoring head — tiny, keep fp16

mlp:
  down_proj: { w_bits: 4, a_bits: 16 }   # down-proj sees larger activations

moe:
  routed:
    down_proj: { w_bits: 4, a_bits: 16 }
  shared:
    w_bits: 8                              # group-level: bump all shared-expert
    a_bits: 8                              # layers to W8A8

attn-cache:
  k: 8
  v: 8
  # q / p not listed -> stay at 16
